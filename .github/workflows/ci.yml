name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Pin npm: runner-bundled npm versions have disagreed on lockfile
      # validation (picomatch hoisting). 11.x is what the lock is authored
      # and verified with.
      - name: Pin npm
        run: |
          npm install -g npm@11
          node --version && npm --version

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  rls:
    name: RLS (local Supabase — never the live project, SDLC §8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm install -g npm@11

      - name: Install
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Applies supabase/migrations/*.sql to a fresh local Postgres — this is
      # the actual proof the migrations are correct, not just that they parse.
      - name: Start local Supabase
        run: supabase start --exclude studio,imgproxy,logflare,vector,pgadmin-schema-diff,pgadmin-http

      - name: Export local Supabase env
        run: supabase status -o env >> "$GITHUB_ENV"

      - name: RLS cross-user isolation tests
        run: npm run test:rls
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}

      - name: Stop local Supabase
        if: always()
        run: supabase stop
